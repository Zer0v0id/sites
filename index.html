<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sites</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --surface: #1a222d;
        --text: #e8eef4;
        --muted: #8b9aab;
        --accent: #5eb8ff;
        --accent-hover: #8ecfff;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6f9;
          --surface: #fff;
          --text: #1a2332;
          --muted: #5c6b7a;
          --accent: #0b6bcb;
          --accent-hover: #0956a3;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }
      main {
        width: 100%;
        max-width: 36rem;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 1.875rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.75rem;
        color: var(--muted);
        font-size: 1rem;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        margin: 0;
      }
      a.card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: var(--surface);
        border: 1px solid color-mix(in srgb, var(--muted) 25%, transparent);
        border-radius: 12px;
        padding: 1.25rem 1.35rem;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      a.card:hover,
      a.card:focus-visible {
        border-color: color-mix(in srgb, var(--accent) 50%, transparent);
        box-shadow: 0 8px 24px color-mix(in srgb, var(--text) 8%, transparent);
        outline: none;
      }
      a.card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .card-title {
        font-weight: 600;
        font-size: 1.0625rem;
        color: var(--accent);
        margin: 0 0 0.35rem;
      }
      .card-title:hover {
        color: var(--accent-hover);
      }
      .card-desc {
        margin: 0;
        font-size: 0.9375rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sites</h1>
      <p>Small tools and pages.</p>
      <ul>
        <li>
          <a class="card" href="taxtool/">
            <div class="card-title">NV Tax Optimizer</div>
            <p class="card-desc">2025 federal tax calculator for Nevada.</p>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
